<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register • Campus Lost & Found</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">LF</div>
      <div class="brand-text">
        <div class="brand-title">Campus Lost & Found</div>
        <div class="brand-subtitle">Create account</div>
      </div>
    </div>

    <div class="topbar-right">
      <a class="btn btn-ghost" href="index.html">Home</a>
      <a class="btn btn-ghost" href="about.html">About Us</a>
      <a class="btn btn-ghost" href="contact.html">Contact Us</a>
    </div>
  </header>

  <!-- CENTERED CARD -->
  <main class="auth">
    <section class="auth-card">
      <h1 class="auth-title">Create account</h1>
      <p class="muted">Register to submit and manage your own reports.</p>

      <div id="toast" class="toast" style="display:none;"></div>

      <form id="registerForm" class="form" novalidate>

        <div class="control">
          <label for="name">Full Name</label>
          <input id="name" type="text" placeholder="Your full name" required />
        </div>

        <div class="control">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" placeholder="you@qiu.edu.my" required />
        </div>

        <div class="control">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="new-password"
                 placeholder="Minimum 6 characters" required />
          <small class="help">Use at least 6 characters.</small>
        </div>

        <div class="control">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" autocomplete="new-password"
                 placeholder="Re-enter password" required />
        </div>

        <div class="checkbox-row">
          <input id="agree" type="checkbox" required />
          <label for="agree">
            I agree to use this system responsibly.
          </label>
        </div>

        <button class="btn btn-primary btn-block" type="submit" id="btnRegister">
          Register
        </button>

        <a class="btn btn-ghost-light btn-block" href="login.html">
          Already have an account?
        </a>

      </form>
    </section>
  </main>

  <footer class="footer">
    © <span id="year"></span> Campus Lost & Found
  </footer>

  <script src="register.js"></script>
  <script src="script.js"></script>
</body>
</html>
